<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Eid Wish</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --bg-dark: #070B19;
    --card-bg: #111827;
    --champagne: #F5E6D3;
    --gold: #D4AF37;
    --gold-light: #F5E17A;
    --text-muted: #9CA3AF;
  }

  /* Reset & Tap Highlight Removal */
  *, *::before, *::after { 
    margin: 0; padding: 0; box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }

  body {
    width: 100%; min-height: 100vh;
    background-color: var(--bg-dark);
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.05), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.08), transparent 25%);
    color: var(--champagne);
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  /* === MAIN CONTAINER === */
  .container {
    background: var(--card-bg);
    border: 1px solid rgba(212, 175, 55, 0.15);
    border-radius: 16px;
    padding: 40px 30px;
    width: 90%; max-width: 450px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-icon {
    font-size: 2.5rem;
    color: var(--gold);
    margin-bottom: 10px;
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
  }

  h2 {
    color: var(--gold-light);
    font-family: 'Cinzel Decorative', cursive;
    font-size: 2rem;
    margin-bottom: 5px;
  }

  p.subtitle { 
    font-size: 0.85rem; 
    color: var(--text-muted); 
    margin-bottom: 30px; 
  }

  /* === FORM ELEMENTS === */
  .input-group { margin-bottom: 20px; text-align: left; }
  .input-group label { 
    display: block; font-size: 0.8rem; color: var(--gold); 
    margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
  }
  .input-group label i { margin-right: 5px; }
  
  input[type="text"], select {
    width: 100%; padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    background: var(--bg-dark);
    color: var(--champagne); 
    font-family: 'Poppins', sans-serif; font-size: 1rem;
    outline: none; transition: all 0.3s ease;
    appearance: none;
  }
  
  select { 
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); 
    background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto; cursor: pointer;
  }
  select option { background: var(--card-bg); color: var(--champagne); }
  
  input[type="text"]:focus, select:focus { 
    border-color: var(--gold); 
    box-shadow: 0 0 15px rgba(212,175,55,0.15); 
  }
  input::placeholder { color: rgba(245, 230, 211, 0.3); }

  /* === STYLISH TOGGLE SWITCH === */
  .stylish-toggle {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 25px; padding: 12px 18px;
    background: rgba(212, 175, 55, 0.05); border-radius: 8px;
    border: 1px solid rgba(212, 175, 55, 0.15);
    cursor: pointer; transition: all 0.3s ease;
  }
  .stylish-toggle:hover { background: rgba(212, 175, 55, 0.08); }
  .stylish-toggle span { font-size: 0.9rem; color: var(--champagne); }
  .stylish-toggle span i { color: var(--gold); margin-right: 8px; }
  
  .stylish-toggle input { display: none; }
  
  .toggle-bg {
    width: 48px; height: 26px; background: rgba(0,0,0,0.6);
    border-radius: 15px; position: relative; transition: 0.4s;
  }
  .toggle-knob {
    width: 20px; height: 20px; background: #fff;
    border-radius: 50%; position: absolute; top: 3px; left: 3px;
    transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  
  .stylish-toggle input:checked + .toggle-bg { background: var(--gold); }
  .stylish-toggle input:checked + .toggle-bg .toggle-knob { transform: translateX(22px); }

  /* === BUTTONS === */
  .action-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 14px 28px; border-radius: 8px;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 500;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    transition: all 0.3s ease;
  }
  .action-btn:hover {
    background: var(--gold); color: var(--bg-dark);
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    transform: translateY(-2px);
  }
  .action-btn:active { transform: translateY(0); }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

  /* === RESULT BOX === */
  #resultBox {
    display: none; margin-top: 25px; padding: 20px;
    background: rgba(212, 175, 55, 0.03); border-radius: 12px; 
    border: 1px dashed rgba(212, 175, 55, 0.3);
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .loader { display: none; font-size: 0.9rem; color: var(--gold-light); margin-top: 15px; }

  #linkOutput {
    font-size: 0.95rem; color: var(--champagne); margin: 15px 0; padding: 15px;
    background: var(--bg-dark); border-radius: 8px; word-break: break-all;
    border: 1px solid rgba(212, 175, 55, 0.2); font-weight: 500;
  }
</style>
</head>
<body>

<div class="container">
  <i class="fa-solid fa-moon header-icon"></i>
  <h2>Create Wish</h2>
  <p class="subtitle">Generate a smart link for your loved ones</p>
  
  <div class="input-group">
    <label><i class="fa-regular fa-user"></i> Recipient Name</label>
    <input type="text" id="nameInput" placeholder="e.g. Salim Shohan" autocomplete="off" />
  </div>

  <div class="input-group">
    <label><i class="fa-solid fa-globe"></i> Wish Language</label>
    <select id="langSelect">
      <option value="en">English (Default)</option>
      <option value="bn">বাংলা (Bengali)</option>
    </select>
  </div>
  
  <label class="stylish-toggle">
    <span><i class="fa-solid fa-gift"></i> Include Salami Request?</span>
    <input type="checkbox" id="salamiCheck" checked />
    <div class="toggle-bg">
      <div class="toggle-knob"></div>
    </div>
  </label>
  
  <button class="action-btn" id="generateBtn" onclick="generateAndShortenLink()">
    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Link
  </button>
  
  <div class="loader" id="loader">
    <i class="fa-solid fa-circle-notch fa-spin"></i> Shortening URL... Please wait
  </div>
  
  <div id="resultBox">
    <p style="font-size: 0.85rem; color: var(--text-muted);">Your Special Short Link:</p>
    <div id="linkOutput"></div>
    <button class="action-btn" id="copyBtn" onclick="copyLink()">
      <i class="fa-regular fa-copy"></i> Copy Link
    </button>
  </div>
</div>

<script>
  /* === FIRE CONFETTI FUNCTION === */
  function fireConfetti() {
    const duration = 3 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    const interval = setInterval(function() {
      const timeLeft = animationEnd - Date.now();
      if (timeLeft <= 0) return clearInterval(interval);
      const particleCount = 50 * (timeLeft / duration);
      
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#D4AF37', '#F5E6D3', '#B8972E'] }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#D4AF37', '#F5E6D3', '#B8972E'] }));
    }, 250);
  }

  // Fire confetti on page load
  window.onload = () => { setTimeout(fireConfetti, 500); };

  /* === LINK GENERATION & SHORTENING === */
  async function generateAndShortenLink() {
    const nameStr = document.getElementById('nameInput').value.trim();
    const lang = document.getElementById('langSelect').value;
    const wantsSalami = document.getElementById('salamiCheck').checked;
    const btn = document.getElementById('generateBtn');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');
    
    if(!nameStr) { alert('Please enter a name first!'); return; }
    
    // UI Loading State
    btn.disabled = true;
    resultBox.style.display = 'none';
    loader.style.display = 'block';
    
    const formattedName = nameStr.replace(/\s+/g, '_');
    
    // URL Logic (Preserved from your original code)
    let baseUrl = window.location.href.split('wish.html')[0];
    if (!baseUrl.endsWith('/')) baseUrl = baseUrl.replace(/[^\/]*$/, ''); 
    
    let longUrl = baseUrl + '?s=' + encodeURIComponent(formattedName);
    if(wantsSalami) longUrl += '&m=true';
    if(lang === 'bn') longUrl += '&lang=bn'; 

    try {
      const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
      const data = await response.json();
      
      let finalUrl = data.shorturl ? data.shorturl : longUrl; 
      
      document.getElementById('linkOutput').innerText = finalUrl;
      showResult();
    } catch (error) {
      console.log("Shortening failed, using long URL", error);
      document.getElementById('linkOutput').innerText = longUrl;
      showResult();
    }
  }

  function showResult() {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
    fireConfetti(); 
  }

  function copyLink() {
    const linkText = document.getElementById('linkOutput').innerText;
    navigator.clipboard.writeText(linkText).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
      btn.style.background = 'var(--gold)';
      btn.style.color = 'var(--bg-dark)';
      
      setTimeout(() => { 
        btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy Link'; 
        btn.style.background = 'transparent'; 
        btn.style.color = 'var(--gold)';
      }, 2500);
    });
  }
</script>

</body>
</html>
