<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid Mubarak - IB Vault Style</title>
<!-- Stylish Tech & Bengali Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Tiro+Bangla:ital@0;1&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<!-- Confetti Library for Surprise -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --bg-dark: #050914; /* Deep Vault Black */
    --card-bg: rgba(12, 18, 34, 0.55);
    --accent-cyan: #00E5FF; /* Neon Cyan */
    --accent-blue: #2979FF;
    --border-glow: rgba(0, 229, 255, 0.25);
    --text-main: #E2E8F0;
    --text-muted: #8A9BB2;
  }

  *, *::before, *::after { 
    margin: 0; padding: 0; box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }

  body {
    background-color: var(--bg-dark);
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }

  /* === MOVING STARS CANVAS === */
  #starCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    pointer-events: none;
  }

  /* Core Core Glow */
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 10%, rgba(41, 121, 255, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 50% 90%, rgba(0, 229, 255, 0.05) 0%, transparent 50%);
    z-index: -1;
  }

  /* === MAIN GLASSMORPHISM CARD === */
  .profile-card {
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--border-glow);
    border-radius: 24px;
    padding: 40px 30px;
    width: 100%;
    max-width: 550px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: vaultOpen 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    z-index: 1;
  }

  @keyframes vaultOpen {
    from { opacity: 0; transform: scale(0.95) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* === ANIMATED NEON MOON === */
  .moon-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    animation: float 4s ease-in-out infinite;
  }

  .neon-moon {
    width: 60px; height: 60px;
    border-radius: 50%;
    box-shadow: inset -15px -15px 0 0 var(--accent-cyan);
    filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.6));
    transform: rotate(-15deg);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* === TEXT ELEMENTS === */
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    color: #fff;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 700;
    margin-bottom: 5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
  }

  /* === COUNTDOWN SECTION === */
  .countdown-wrapper {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 25px 0;
  }
  
  .time-box {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 12px;
    padding: 10px 15px;
    min-width: 70px;
    box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.05);
  }

  .time-box span {
    display: block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent-cyan);
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }

  .time-box small {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* === DUA CARD (BLUR + TRANSPARENT) === */
  .dua-card {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-glow);
    border-left: 3px solid var(--accent-cyan);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }
  
  .dua-card:hover {
    background: rgba(0, 229, 255, 0.05);
    border-color: rgba(0, 229, 255, 0.4);
  }

  .arabic-dua {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: #fff;
    margin-bottom: 10px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
  }

  .english-dua {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-style: italic;
  }

  .bangla-dua {
    font-family: 'Tiro Bangla', serif;
    font-size: 1rem;
    color: var(--accent-cyan);
  }

  /* === DYNAMIC WISH === */
  .wish-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    color: #fff;
    margin-bottom: 20px;
    display: none;
    text-shadow: 0 0 10px rgba(41, 121, 255, 0.6);
  }

  /* === BUTTON === */
  .action-btn {
    display: inline-block;
    padding: 14px 30px;
    background: rgba(0, 229, 255, 0.1);
    color: var(--accent-cyan);
    border: 1px solid var(--accent-cyan);
    border-radius: 30px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    text-decoration: none;
    letter-spacing: 1.5px;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
    margin-bottom: 25px;
  }

  .action-btn:hover {
    background: var(--accent-cyan);
    color: #000;
    box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
    transform: translateY(-2px);
  }

  /* === VISITOR COUNT === */
  .visitor-box {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 15px;
  }

  .visitor-box span {
    color: var(--accent-cyan);
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* === CREATED BY LINK === */
  .created-by {
    display: inline-block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.4);
    text-decoration: none;
    letter-spacing: 1px;
    transition: 0.3s;
    border-bottom: 1px dashed transparent;
  }

  .created-by:hover {
    color: var(--accent-cyan);
    border-bottom: 1px dashed var(--accent-cyan);
  }

</style>
</head>
<body>

<!-- Moving Stars Background -->
<canvas id="starCanvas"></canvas>

<div class="profile-card">
  
  <!-- Animated Moon -->
  <div class="moon-container">
    <div class="neon-moon"></div>
  </div>

  <!-- Heading -->
  <h1>Eid Mubarak</h1>

  <!-- Live Countdown -->
  <div class="countdown-wrapper">
    <div class="time-box">
      <span id="cd-days">00</span>
      <small>Days</small>
    </div>
    <div class="time-box">
      <span id="cd-hours">00</span>
      <small>Hours</small>
    </div>
    <div class="time-box">
      <span id="cd-mins">00</span>
      <small>Mins</small>
    </div>
    <div class="time-box">
      <span id="cd-secs">00</span>
      <small>Secs</small>
    </div>
  </div>

  <!-- Dynamic Wish Name -->
  <div id="wishName" class="wish-name"></div>

  <!-- Transparent Dua Card -->
  <div class="dua-card">
    <div class="arabic-dua">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</div>
    <div class="english-dua">"Taqabbalallahu minna wa minkum"</div>
    <div class="english-dua">May Allah accept (good deeds) from us and from you.</div>
    <div class="bangla-dua">আল্লাহ আমাদের এবং আপনাদের পক্ষ থেকে (সৎকর্ম) কবুল করুন।</div>
  </div>

  <!-- Wish Action Button -->
  <a href="wish.html" class="action-btn">Create Your Wish</a>

  <!-- Live Visitor Count (API) -->
  <div class="visitor-box">
    👁️ Page Visits: <span id="visitor-count">Loading...</span>
  </div>

  <!-- Created By Link -->
  <a href="salim.html" class="created-by">Created by Salim</a>

</div>

<script>
  /* === SURPRISE CONFETTI ON LOAD === */
  function fireSurprise() {
    const duration = 4 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    const interval = setInterval(function() {
      const timeLeft = animationEnd - Date.now();
      if (timeLeft <= 0) return clearInterval(interval);
      const particleCount = 60 * (timeLeft / duration);
      
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#00E5FF', '#2979FF', '#ffffff'] }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#00E5FF', '#2979FF', '#ffffff'] }));
    }, 250);
  }

  /* === DYNAMIC NAME CHECK === */
  document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    let name = params.get('s');
    
    if (name && name.trim() !== '') {
      name = name.replace(/_/g, ' ');
      name = name.replace(/\b\w/g, c => c.toUpperCase());
      const wishNameEl = document.getElementById('wishName');
      wishNameEl.innerHTML = `Special Wish For<br><span style="color: var(--accent-cyan); font-size: 1.8rem;">${name}</span>`;
      wishNameEl.style.display = 'block';
    }

    // Fire Surprise Confetti
    setTimeout(fireSurprise, 500);

    /* === COUNTAPI INTEGRATION === */
    fetch('https://api.countapi.xyz/hit/eid1447/visits')
      .then(res => res.json())
      .then(data => {
        document.getElementById('visitor-count').innerText = data.value;
      })
      .catch(err => {
        console.log("CountAPI Error:", err);
        document.getElementById('visitor-count').innerText = "1,447+"; // Fallback if API is down
      });
  });

  /* === LIVE EID COUNTDOWN LOGIC === */
  // Target Date: 28 Days from now in 2025 as requested
  const targetDate = new Date("February 28, 2025 00:00:00").getTime();

  const countdownInterval = setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance < 0) {
      clearInterval(countdownInterval);
      document.getElementById("cd-days").innerText = "00";
      document.getElementById("cd-hours").innerText = "00";
      document.getElementById("cd-mins").innerText = "00";
      document.getElementById("cd-secs").innerText = "00";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("cd-days").innerText = days.toString().padStart(2, '0');
    document.getElementById("cd-hours").innerText = hours.toString().padStart(2, '0');
    document.getElementById("cd-mins").innerText = minutes.toString().padStart(2, '0');
    document.getElementById("cd-secs").innerText = seconds.toString().padStart(2, '0');
  }, 1000);

  /* === MOVING STARS CANVAS BACKGROUND === */
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5,
      speedY: Math.random() * 0.5 + 0.1,
      alpha: Math.random()
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00E5FF';
    
    stars.forEach(star => {
      ctx.globalAlpha = star.alpha;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Move star down
      star.y += star.speedY;
      
      // Reset at top if it goes off screen
      if (star.y > canvas.height) {
        star.y = 0;
        star.x = Math.random() * canvas.width;
      }
    });
    
    requestAnimationFrame(drawStars);
  }
  drawStars();

</script>
</body>
</html>
