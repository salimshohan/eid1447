<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Eid Wish 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F5E17A;
    --emerald-dark: #020C07;
    --glass-bg: rgba(10, 30, 20, 0.55);
    --glass-border: rgba(212, 175, 55, 0.25);
  }

  /* Reset & Tap Highlight Removal for Mobile */
  *, *::before, *::after { 
    margin: 0; padding: 0; box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; /* Removes mobile click circle */
  }

  html, body {
    width: 100%; height: 100%;
    overflow-x: hidden;
    background: var(--emerald-dark);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* === BG & PARTICLES === */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%; background: var(--gold-light);
    opacity: 0; animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 0.6; }
    80% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(10, 61, 46, 0.5) 0%, transparent 80%);
    z-index: -1; pointer-events: none;
  }

  /* === SMART GLASS CARD === */
  .container {
    position: relative; z-index: 1;
    background: var(--glass-bg);
    backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px 30px;
    width: 90%; max-width: 450px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: frameReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  @keyframes frameReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h2 {
    color: var(--gold-light);
    font-family: 'Cinzel Decorative', cursive;
    font-size: 2.2rem;
    margin-bottom: 5px;
    text-shadow: 0 0 20px rgba(212,175,55,0.5);
  }

  p.subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 30px; }

  /* === FORM ELEMENTS === */
  .input-group { margin-bottom: 20px; text-align: left; }
  .input-group label { display: block; font-size: 0.75rem; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500;}
  
  input[type="text"], select {
    width: 100%; padding: 15px 18px;
    border-radius: 12px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    background: rgba(0,0,0,0.3);
    color: #fff; font-family: 'Poppins', sans-serif; font-size: 1rem;
    outline: none; transition: all 0.3s ease;
    appearance: none;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
  }
  
  select { 
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); 
    background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto; cursor: pointer;
  }
  select option { background: #081c15; color: #fff; }
  input[type="text"]:focus, select:focus { border-color: var(--gold-light); box-shadow: 0 0 20px rgba(212,175,55,0.2); background: rgba(0,0,0,0.5);}
  input::placeholder { color: rgba(255,255,255,0.3); }

  /* === STYLISH TOGGLE SWITCH === */
  .stylish-toggle {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 25px; padding: 12px 18px;
    background: rgba(255,255,255,0.03); border-radius: 12px;
    border: 1px solid rgba(212, 175, 55, 0.15);
    cursor: pointer; transition: all 0.3s ease;
  }
  .stylish-toggle:hover { background: rgba(255,255,255,0.06); }
  .stylish-toggle span { font-size: 0.9rem; color: rgba(255,255,255,0.9); }
  
  .stylish-toggle input { display: none; }
  
  .toggle-bg {
    width: 48px; height: 26px; background: rgba(0,0,0,0.6);
    border-radius: 15px; position: relative; transition: 0.4s;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
  }
  .toggle-knob {
    width: 20px; height: 20px; background: #fff;
    border-radius: 50%; position: absolute; top: 3px; left: 3px;
    transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  
  /* Toggle Active State */
  .stylish-toggle input:checked + .toggle-bg { background: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
  .stylish-toggle input:checked + .toggle-bg .toggle-knob { transform: translateX(22px); }

  /* === AUTO COLOR CHANGING BUTTON === */
  button.primary-btn {
    position: relative;
    border: none; padding: 16px; border-radius: 30px;
    font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; width: 100%;
    letter-spacing: 1px; text-transform: uppercase; 
    color: #000;
    /* Animated Gradient Background */
    background: linear-gradient(90deg, #D4AF37, #F5E17A, #34D399, #D4AF37, #F5E17A);
    background-size: 400% 400%;
    animation: gradientShift 4s ease infinite;
    box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  button.primary-btn:hover { 
    transform: translateY(-3px) scale(1.02); 
    box-shadow: 0 12px 25px rgba(212, 175, 55, 0.5); 
  }
  button.primary-btn:active { transform: translateY(1px); }
  button.primary-btn:disabled { opacity: 0.7; cursor: not-allowed; animation: none; background: #555; color: #aaa;}

  /* === RESULT BOX === */
  #resultBox {
    display: none; margin-top: 25px; padding: 20px;
    background: rgba(0,0,0,0.4); border-radius: 16px; border: 1px dashed rgba(212, 175, 55, 0.5);
    animation: fadeIn 0.5s ease-out;
  }
  
  .loader { display: none; font-size: 0.85rem; color: var(--gold-light); margin-top: 15px; animation: pulse 1s infinite alternate; }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

  #linkOutput {
    font-size: 1rem; color: #fff; margin: 15px 0; padding: 15px;
    background: rgba(212, 175, 55, 0.1); border-radius: 10px; word-break: break-all;
    border: 1px solid rgba(212, 175, 55, 0.3); font-weight: 500;
  }

  button.copy-btn {
    background: transparent; border: 1px solid var(--gold); color: var(--gold-light);
    padding: 10px 25px; border-radius: 30px; font-family: 'Poppins', sans-serif;
    font-size: 0.9rem; cursor: pointer; transition: 0.3s; font-weight: 500;
  }
  button.copy-btn:hover { background: rgba(212, 175, 55, 0.2); color: #fff;}
</style>
</head>
<body>

<div id="particles"></div>

<div class="container">
  <h2>Create Wish</h2>
  <p class="subtitle">Generate a smart link for your loved ones</p>
  
  <div class="input-group">
    <label>Recipient Name</label>
    <input type="text" id="nameInput" placeholder="e.g. Salim Shohan" autocomplete="off" />
  </div>

  <div class="input-group">
    <label>Wish Language</label>
    <select id="langSelect">
      <option value="en">English (Default)</option>
      <option value="bn">বাংলা (Bengali)</option>
    </select>
  </div>
  
  <label class="stylish-toggle">
    <span>Include Salami Request? 🎁</span>
    <input type="checkbox" id="salamiCheck" checked />
    <div class="toggle-bg">
      <div class="toggle-knob"></div>
    </div>
  </label>
  
  <button class="primary-btn" id="generateBtn" onclick="generateAndShortenLink()">Generate Link ✦</button>
  <div class="loader" id="loader">Shortening URL... Please wait ⏳</div>
  
  <div id="resultBox">
    <p style="font-size: 0.85rem; color: rgba(255,255,255,0.7);">Your Special Short Link:</p>
    <div id="linkOutput"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy Link</button>
  </div>
</div>

<script>
  /* === FIRE CONFETTI FUNCTION === */
  function fireConfetti() {
    const duration = 3 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    const interval = setInterval(function() {
      const timeLeft = animationEnd - Date.now();
      if (timeLeft <= 0) return clearInterval(interval);
      const particleCount = 50 * (timeLeft / duration);
      
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#D4AF37', '#ffffff', '#F5E17A'] }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#D4AF37', '#ffffff', '#F5E17A'] }));
    }, 250);
  }

  // Fire confetti on page load
  window.onload = () => { setTimeout(fireConfetti, 500); };

  /* === LINK GENERATION & SHORTENING === */
  async function generateAndShortenLink() {
    const nameStr = document.getElementById('nameInput').value.trim();
    const lang = document.getElementById('langSelect').value;
    const wantsSalami = document.getElementById('salamiCheck').checked;
    const btn = document.getElementById('generateBtn');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');
    
    if(!nameStr) { alert('Please enter a name first! 🌙'); return; }
    
    // UI Loading State
    btn.disabled = true;
    resultBox.style.display = 'none';
    loader.style.display = 'block';
    
    const formattedName = nameStr.replace(/\s+/g, '_');
    
    let baseUrl = window.location.href.split('wish.html')[0];
    if (!baseUrl.endsWith('/')) baseUrl = baseUrl.replace(/[^\/]*$/, ''); 
    
    let longUrl = baseUrl + '?s=' + encodeURIComponent(formattedName);
    if(wantsSalami) longUrl += '&m=true';
    if(lang === 'bn') longUrl += '&lang=bn'; 

    try {
      const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
      const data = await response.json();
      
      let finalUrl = data.shorturl ? data.shorturl : longUrl; 
      
      document.getElementById('linkOutput').innerText = finalUrl;
      showResult();
    } catch (error) {
      console.log("Shortening failed, using long URL", error);
      document.getElementById('linkOutput').innerText = longUrl;
      showResult();
    }
  }

  function showResult() {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
    fireConfetti(); 
  }

  function copyLink() {
    const linkText = document.getElementById('linkOutput').innerText;
    navigator.clipboard.writeText(linkText).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerText = 'Copied! ✅';
      btn.style.background = 'rgba(212, 175, 55, 0.3)';
      btn.style.color = '#fff';
      setTimeout(() => { 
        btn.innerText = 'Copy Link'; 
        btn.style.background = 'transparent'; 
        btn.style.color = 'var(--gold-light)';
      }, 2500);
    });
  }

  /* === FLOATING PARTICLES === */
  const particlesWrap = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*20 + 100}%;
      animation-duration:${Math.random()*10+10}s;
      animation-delay:${Math.random()*5}s;
      box-shadow: 0 0 ${size*2}px #D4AF37;
    `;
    particlesWrap.appendChild(p);
  }
</script>

</body>
</html>
